name: Publish to PyPI

# Publishes on a version tag (e.g. v0.1.0) using PyPI Trusted Publishing (OIDC) —
# no API token / secret is stored. See README "Releasing" for the one-time PyPI
# trusted-publisher setup that must match this workflow file name + environment.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: build & publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/uniprot-mcp
    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG != pyproject version $VER"; exit 1; }

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publishing / OIDC, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
